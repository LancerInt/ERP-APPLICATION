version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-erp_db}
      POSTGRES_USER: ${DATABASE_USER:-erp_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-erp_user} -d ${DATABASE_NAME:-erp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-django
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://${DATABASE_USER:-erp_user}:${DATABASE_PASSWORD:-changeme}@db:5432/${DATABASE_NAME:-erp_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      ALLOWED_HOSTS: localhost,127.0.0.1,django
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-celery-worker
    command: celery -A config worker -l info --concurrency=4
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://${DATABASE_USER:-erp_user}:${DATABASE_PASSWORD:-changeme}@db:5432/${DATABASE_NAME:-erp_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - django
    networks:
      - erp-network
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://${DATABASE_USER:-erp_user}:${DATABASE_PASSWORD:-changeme}@db:5432/${DATABASE_NAME:-erp_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - django
    networks:
      - erp-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_NAME: Lancer ERP
    container_name: erp-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: Lancer ERP
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - django
    networks:
      - erp-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  erp-network:
    driver: bridge
